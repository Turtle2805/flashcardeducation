<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard & Trắc Nghiệm Từ Vựng Education HSA - Ms Lê Hằng English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Đồng bộ màu nền gradient hồng cam dịu mắt chính xác theo ảnh image_b60c40.jpg */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #FF7675, #FDCB6E, #FF8E53, #FF6B81);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            z-index: 1;
        }

        /* Thanh tiêu đề Giáo viên màu trắng viền tím bo góc giống ảnh mẫu */
        .header-panel {
            text-align: center;
            background: #FFFFFF;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            border: 3px solid #6C5CE7;
        }

        .header-panel h1 {
            font-size: 15pt;
            color: #6C5CE7;
            margin: 0;
            font-weight: 900;
        }

        /* Nút chuyển chế độ Tab */
        .tab-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .tab-btn {
            background: #FFFFFF;
            border: none;
            padding: 12px 25px;
            font-size: 10.5pt;
            font-weight: 900;
            border-radius: 14px;
            cursor: pointer;
            color: #4A5568;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #00CEC9;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 206, 201, 0.3);
        }

        /* Khung chứa Flashcard lật mặt */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 28px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background: #FFFFFF;
        }

        .card-front {
            color: #2C3E50;
        }

        .card-back {
            background: #6C5CE7;
            color: #FFFFFF;
            transform: rotateY(180deg);
        }

        .word-title {
            font-size: 26pt;
            font-weight: 900;
            margin-bottom: 12px;
            color: #6C5CE7;
            letter-spacing: -0.5px;
        }

        .card-back .word-title {
            color: #FFFFFF;
        }

        .word-meta {
            font-size: 11.5pt;
            color: #718096;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .word-meaning {
            font-size: 18pt;
            font-weight: 900;
            line-height: 1.5;
        }

        /* Hộp điều khiển TRƯỚC / SAU chuẩn ảnh mẫu */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px 15px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .nav-btn {
            background: #FDCB6E;
            border: 2px solid #E6A115;
            color: #2C3E50;
            padding: 10px 24px;
            font-size: 10.5pt;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #E6A115;
            transition: all 0.1s;
        }

        .nav-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .progress-text {
            font-weight: 900;
            color: #4A5568;
            font-size: 12pt;
        }

        /* Giao diện vùng Trắc nghiệm phản xạ */
        .quiz-panel {
            background: white;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            display: none;
        }

        .quiz-question {
            font-size: 14pt;
            font-weight: 900;
            color: #2C3E50;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .quiz-opt-btn {
            background: #FFFFFF;
            border: 2px solid #E2E8F0;
            padding: 15px 20px;
            text-align: left;
            font-size: 11pt;
            font-weight: 700;
            color: #4A5568;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 3px 0 #E2E8F0;
            transition: all 0.1s;
        }

        .quiz-opt-btn:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .quiz-opt-btn.correct {
            background: #00D26A !important;
            color: white !important;
            border-color: #00A855 !important;
            box-shadow: 0 3px 0 #00A855 !important;
        }

        .quiz-opt-btn.wrong {
            background: #FF4757 !important;
            color: white !important;
            border-color: #D63031 !important;
            box-shadow: 0 3px 0 #D63031 !important;
        }

        .hint-text {
            text-align: center;
            color: #FFFFFF;
            font-weight: 700;
            font-size: 10.5pt;
            margin: 12px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <!-- Header trùng khớp style image_b60c40.jpg -->
        <div class="header-panel">
            <h1>Chuyên Đề Từ Vựng HSA - Ms Lê Hằng English</h1>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="tab-flash" onclick="switchMode('flash')">THỂ GHI NHỚ (FLASHCARD)</button>
            <button class="tab-btn" id="tab-quiz" onclick="switchMode('quiz')">TRẮC NGHIỆM PHẢN XẠ</button>
        </div>

        <!-- Khung chế độ Thẻ ghi nhớ Flashcard -->
        <div id="flash-section">
            <div class="flashcard-wrapper" onclick="toggleFlip()">
                <div class="flashcard" id="fcard">
                    <div class="card-face card-front">
                        <div class="word-title" id="front-word">Educate</div>
                        <div class="word-meta" id="front-type">Từ loại: v</div>
                        <div class="word-meta" id="front-ipa">/ˈedʒ.ʊ.keɪt/</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="word-meta" style="color: #E2E8F0; font-weight:900;">Ý NGHĨA TIẾNG VIỆT</div>
                        <div class="word-meaning" id="back-meaning">Giáo dục</div>
                    </div>
                </div>
            </div>
            
            <p class="hint-text">💡 Bấm vào thẻ để lật xem ý nghĩa và phát âm con nhé!</p>

            <div class="controls">
                <button class="nav-btn" onclick="prevCard()">TRƯỚC</button>
                <div class="progress-text" id="card-progress">1 / 50</div>
                <button class="nav-btn" onclick="nextCard()">SAU</button>
            </div>
        </div>

        <!-- Khung chế độ Trắc nghiệm phản xạ -->
        <div id="quiz-section" class="quiz-panel">
            <div class="quiz-question" id="q-text">Đang tải câu hỏi...</div>
            <div class="quiz-options" id="q-options"></div>
            <div class="controls" style="margin-top: 25px; box-shadow: none; padding: 10px 0 0 0;">
                <div class="progress-text" id="quiz-progress">Câu hỏi: 1 / 50</div>
                <button class="nav-btn" onclick="nextQuizQuestion()">CÂU TIẾP THEO</button>
            </div>
        </div>
    </div>

    <script>
        // Dữ liệu chuẩn hóa gồm 50 từ vựng chủ đề Giáo dục & Học thuật sạch lỗi chính tả
        const wordList = [
            {eng:"Educate", ipa:"/ˈedʒ.ʊ.keɪt/", type:"v", vi:"Giáo dục"},
            {eng:"Education", ipa:"/ˌedʒ.ʊˈkeɪ.ʃən/", type:"n", vi:"Nền giáo dục"},
            {eng:"Educational", ipa:"/ˌedʒ.ʊˈkeɪ.ʃən.əl/", type:"adj", vi:"Thuộc giáo dục"},
            {eng:"Teach", ipa:"/tiːtʃ/", type:"v", vi:"Dạy học"},
            {eng:"Teacher", ipa:"/ˈtiː.tʃər/", type:"n", vi:"Giáo viên"},
            {eng:"Teaching", ipa:"/ˈtiː.tʃɪŋ/", type:"n", vi:"Việc giảng dạy"},
            {eng:"Lecturer", ipa:"/ˈlek.tʃər.ər/", type:"n", vi:"Giảng viên đại học"},
            {eng:"Professor", ipa:"/prəˈfes.ər/", type:"n", vi:"Giáo sư học thuật"},
            {eng:"Curriculum", ipa:"/kəˈrɪk.jə.ləm/", type:"n", vi:"Chương trình học khung"},
            {eng:"Course", ipa:"/kɔːs/", type:"n", vi:"Khóa học"},
            {eng:"Subject", ipa:"/ˈsʌbdʒɪkt/", type:"n", vi:"Môn học"},
            {eng:"Major", ipa:"/ˈmeɪ.dʒər/", type:"n", vi:"Chuyên ngành học đại học"},
            {eng:"Assignment", ipa:"/əˈsaɪn.mənt/", type:"n", vi:"Bài tập lớn được giao"},
            {eng:"Pedagogy", ipa:"/ˈped.ə.ɡɒdʒ.i/", type:"n", vi:"Phương pháp giảng dạy, khoa sư phạm"},
            {eng:"Cognition", ipa:"/kɒɡˈnɪʃ.ən/", type:"n", vi:"Quá trình nhận thức của tâm trí"},
            {eng:"Curriculum reform", ipa:"/kəˈrɪk.jə.ləm rɪˈfɔːm/", type:"np", vi:"Cải cách chương trình học"},
            {eng:"Intellectual", ipa:"/ˌɪn.təlˈek.tʃu.əl/", type:"adj/n", vi:"Thuộc trí tuệ / Người trí thức"},
            {eng:"Scholarship", ipa:"/ˈskɒl.ə.ʃɪp/", type:"n", vi:"Học bổng"},
            {eng:"Mark / Grade", ipa:"/mɑːk/ - /ɡreɪd/", type:"n", vi:"Điểm số bài kiểm tra"},
            {eng:"Qualification", ipa:"/ˌkwɒl.ɪ.fɪˈkeɪ.ʃən/", type:"n", vi:"Bằng cấp chuyên môn"},
            {eng:"Degree", ipa:"/dɪˈɡriː/", type:"n", vi:"Bằng tốt nghiệp đại học chính quy"},
            {eng:"Critical thinking", ipa:"/ˈkrɪt.ɪ.kəl ˈθɪŋ.kɪŋ/", type:"np", vi:"Tư duy phản biện phân tích"},
            {eng:"Tuition", ipa:"/tʃuˈɪʃ.ən/", type:"n", vi:"Học phí trường học"},
            {eng:"Graduate", ipa:"/ˈɡrædʒ.u.eɪt/", type:"v", vi:"Tốt nghiệp ra trường"},
            {eng:"Graduation", ipa:"/ˌɡrædʒ.uˈeɪ.ʃən/", type:"n", vi:"Sự tốt nghiệp, lễ phát bằng"},
            {eng:"Holistic", ipa:"/həʊˈlɪs.tɪk/", type:"adj", vi:"Toàn diện, tổng thể mọi mặt"},
            {eng:"Revise", ipa:"/rɪˈvaɪz/", type:"v", vi:"Ôn tập kiến thức"},
            {eng:"Revision", ipa:"/rɪˈvɪʒ.ən/", type:"n", vi:"Sự ôn tập bài vở"},
            {eng:"Postgraduate", ipa:"/ˌpəʊstˈɡrædʒ.u.ət/", type:"n", vi:"Nghiên cứu sinh / Học viên cao học"},
            {eng:"Discipline", ipa:"/ˈdɪs.ə.plɪn/", type:"n", vi:"Kỷ luật, khuôn phép nền nếp"},
            {eng:"Knowledge", ipa:"/ˈnɒl.ɪdʒ/", type:"n", vi:"Kiến thức, sự hiểu biết tích lũy"},
            {eng:"Academic", ipa:"/ˌæk.əˈdem.ɪk/", type:"adj", vi:"Thuộc học thuật nghiên cứu"},
            {eng:"Literacy", ipa:"/ˈlɪt.ər.ə.si/", type:"n", vi:"Khability năng đọc viết cơ bản"},
            {eng:"Semester", ipa:"/sɪˈmes.tər/", type:"n", vi:"Học kỳ (nửa năm học)"},
            {eng:"Educator", ipa:"/ˈedʒ.ʊ.keɪ.tər/", type:"n", vi:"Nhà giáo dục xuất sắc"},
            {eng:"Laboratory", ipa:"/ləˈbɒr.ə.tər.i/", type:"n", vi:"Phòng thí nghiệm thực hành"},
            {eng:"Numeracy", ipa:"/ˈnjuː.mər.ə.si/", type:"n", vi:"Khả năng tính toán số liệu"},
            {eng:"Assess", ipa:"/əˈses/", type:"v", vi:"Đánh giá năng lực trình độ"},
            {eng:"Assessment", ipa:"/əˈses.mənt/", type:"n", vi:"Sự kiểm tra đánh giá"},
            {eng:"Approach", ipa:"/əˈprəʊtʃ/", type:"n", vi:"Cách tiếp cận, phương thức giải quyết"},
            {eng:"Methodology", ipa:"/ˌmeθ.əˈdɒl.ə.dʒi/", type:"n", vi:"Hệ phương pháp học/nghiên cứu"},
            {eng:"Infer", ipa:"/ɪnˈfɜːr/", type:"v", vi:"Suy ra, diễn dịch ra ý nghĩa"},
            {eng:"Inference", ipa:"/ˈɪn.fər.əns/", type:"n", vi:"Sự suy luận logic"},
            {eng:"Acquire", ipa:"/əˈkwaɪər/", type:"v", vi:"Tiếp thu, đạt được kiến thức kỹ năng"},
            {eng:"Hypothesis", ipa:"/haɪˈpɒθ.ə.sɪs/", type:"n", vi:"Giả thuyết đặt ra chưa chứng minh"},
            {eng:"Theory", ipa:"/ˈθɪə.ri/", type:"n", vi:"Lý thuyết, học thuyết khoa học"},
            {eng:"Criteria", ipa:"/kraɪˈtɪə.ri.ə/", type:"n", vi:"Các tiêu chí quy chuẩn xét duyệt"},
            {eng:"Comprehend", ipa:"/ˌkɒm.prɪˈhend/", type:"v", vi:"Hiểu sâu sắc trọn vẹn bản chất"},
            {eng:"Comprehension", ipa:"/ˌkɒm.prɪˈhen.ʃən/", type:"n", vi:"Sự thấu hiểu, bài tập đọc hiểu"},
            {eng:"Enhance", ipa:"/ɪnˈhɑːns/", type:"v", vi:"Nâng cao, gia tăng giá trị chất lượng"}
        ];

        let currentCardIndex = 0;
        let currentQuizIndex = 0;
        let quizAnswered = false;

        // Mô phỏng Audio sinh động bằng Web Audio API
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function playSound(type) {
            try {
                if(!audioCtx) audioCtx = new AudioCtx();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                if(type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    gain.gain.setValueAtTime(0.12, now);
                } else {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(160, now);
                    osc.frequency.linearRampToValueAtTime(110, now + 0.25);
                    gain.gain.setValueAtTime(0.12, now);
                }
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.3);
            } catch(e){}
        }

        // Hiệu ứng pháo hoa ăn mừng
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function triggerEffects() {
            particles = [];
            for(let i=0; i<35; i++) {
                particles.push({
                    x: canvas.width/2 + (Math.random()*160 - 80),
                    y: canvas.height/2 + (Math.random()*160 - 80),
                    size: Math.random()*5 + 3,
                    color: ['#00CEC9','#6C5CE7','#FF7675','#FDCB6E'][Math.floor(Math.random()*4)],
                    vX: Math.random()*6 - 3, vY: Math.random()*6 - 3
                });
            }
            animate();
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            particles.forEach(p => {
                p.x += p.vX; p.y += p.vY; p.vY += 0.12;
                if(p.y < canvas.height) alive = true;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            if(alive) requestAnimationFrame(animate);
        }

        // Thay đổi Tab điều hướng chế độ học tập
        function switchMode(mode) {
            document.getElementById('tab-flash').classList.remove('active');
            document.getElementById('tab-quiz').classList.remove('active');
            document.getElementById('flash-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'none';

            if(mode === 'flash') {
                document.getElementById('tab-flash').classList.add('active');
                document.getElementById('flash-section').style.display = 'block';
            } else {
                document.getElementById('tab-quiz').classList.add('active');
                document.getElementById('quiz-section').style.display = 'block';
                loadQuizQuestion();
            }
        }

        // Xử lý cơ chế Thẻ ghi nhớ Flashcard
        function updateCard() {
            const item = wordList[currentCardIndex];
            document.getElementById('fcard').classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('front-word').innerText = item.eng;
                document.getElementById('front-type').innerText = `Từ loại: ${item.type}`;
                document.getElementById('front-ipa').innerText = item.ipa;
                document.getElementById('back-meaning').innerText = item.vi;
                document.getElementById('card-progress').innerText = `${currentCardIndex + 1} / ${wordList.length}`;
            }, 120);
        }
        function toggleFlip() { document.getElementById('fcard').classList.toggle('flipped'); }
        function nextCard() { if(currentCardIndex < wordList.length - 1) { currentCardIndex++; updateCard(); } }
        function prevCard() { if(currentCardIndex > 0) { currentCardIndex--; updateCard(); } }

        // Xử lý cơ chế Trắc nghiệm phản xạ
        function loadQuizQuestion() {
            quizAnswered = false;
            const currentWord = wordList[currentQuizIndex];
            document.getElementById('quiz-progress').innerText = `Câu hỏi: ${currentQuizIndex + 1} / ${wordList.length}`;
            document.getElementById('q-text').innerText = `Từ tiếng Anh nào dưới đây mang nghĩa: "${currentWord.vi}"?`;

            let options = [currentWord.eng];
            while(options.length < 4) {
                let randomWord = wordList[Math.floor(Math.random() * wordList.length)].eng;
                if(!options.includes(randomWord)) options.push(randomWord);
            }
            options.sort(() => Math.random() - 0.5); // Xáo trộn đáp án ngẫu nhiên

            const optContainer = document.getElementById('q-options');
            optContainer.innerHTML = '';
            options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-opt-btn';
                btn.innerText = `${String.fromCharCode(65 + idx)}. ${opt}`;
                btn.onclick = () => selectOption(btn, opt, currentWord.eng);
                optContainer.appendChild(btn);
            });
        }

        function selectOption(btn, chosen, correct) {
            if(quizAnswered) return;
            quizAnswered = true;

            if(chosen === correct) {
                btn.classList.add('correct');
                playSound('correct');
                triggerEffects();
            } else {
                btn.classList.add('wrong');
                playSound('wrong');
                const btns = document.getElementsByClassName('quiz-opt-btn');
                for(let b of btns) {
                    if(b.innerText.includes(correct)) b.classList.add('correct');
                }
            }
        }

        function nextQuizQuestion() {
            if(currentQuizIndex < wordList.length - 1) {
                currentQuizIndex++;
                loadQuizQuestion();
            } else {
                alert("🎉 Chúc mừng con đã hoàn thành xuất sắc chuỗi trắc nghiệm phản xạ 50 từ vựng chủ đề Giáo dục!");
                currentQuizIndex = 0;
                loadQuizQuestion();
            }
        }

        window.onload = () => { updateCard(); };
    </script>
</body>
</html>
